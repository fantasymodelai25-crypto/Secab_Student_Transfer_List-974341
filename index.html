<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#ffffff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
    background:#ffffff;
    border:1px solid #e6e6e6;
    border-radius:18px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.main-title{
    text-align:center;
    font-size:30px;
    font-weight:700;
    color:#222;
    margin-bottom:8px;
}

h2{
    text-align:center;
    color:#666;
    font-size:16px;
    font-weight:600;
    margin-bottom:18px;
    padding-bottom:10px;
    border-bottom:1px solid #eaeaea;
}

.list{
    font-size:17px;
    color:#222;
}

.item{
    padding:12px 14px;
    margin-bottom:10px;
    border:1px solid #ececec;
    border-radius:10px;
    background:#fff;
}

.readmore{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#1565c0;
    font-weight:600;
    cursor:pointer;
    user-select:none;
}

.readmore:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<h1 class="main-title">🎉 Happy Birthday 🎉</h1>

<h2>Birthday Celebration</h2>

<div class="list">

<div class="item">1. Kaship Uoti</div>

<div class="item">2. Shahnawaz Gogi</div>

<div class="item">3. Talha Manguli</div>

<span id="readMore" class="readmore">+17 more names...</span>

</div>

</div>

<audio id="sound" src="sound.mp3" loop></audio>

<script>

const sound = document.getElementById("sound");

document.getElementById("readMore").onclick = function(){

    sound.currentTime = 0;
    sound.play();

    this.innerHTML = "🎂 Enjoy Your Birthday!";
    this.style.color = "#444";

};

</script>

</body>
</html>
